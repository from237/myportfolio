<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김종백 | Business Strategy & AI Portfolio</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark: #0f172a;   
            --primary-main: #1e293b;   
            --accent-color: #2563eb;   
            --text-main: #334155;      
            --text-light: #64748b;     
            --bg-light: #f8fafc;       
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #059669;        
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            word-break: keep-all;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- Hero Section --- */
        .hero {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1e3a8a 100%);
            color: var(--white);
            padding: 80px 20px 100px;
            text-align: center;
            position: relative;
        }

        .hero-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-thumb {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            margin-bottom: 25px;
            background-color: #cbd5e1;
            /* 프로필 이미지 있으면 아래 경로 수정 */
            background-image: url('profile.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .hero .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
            margin-bottom: 15px;
            color: #bfdbfe;
        }

        .hero .email-info {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .hero-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .btn:hover { transform: translateY(-2px); }

        /* --- Main Layout --- */
        .container {
            max-width: 900px;
            margin: -60px auto 0;
            padding: 0 20px 60px;
            position: relative;
            z-index: 3;
        }

        section {
            background: var(--white);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--bg-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i { color: var(--accent-color); font-size: 1.2rem; }

        /* --- About & Skills --- */
        .about-text {
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .about-text strong { color: var(--accent-color); }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .skill-badge {
            background-color: #eff6ff;
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid #dbeafe;
        }

        /* --- Timeline --- */
        .timeline {
            position: relative;
            padding-left: 10px;
        }

        .timeline-item {
            position: relative;
            padding-left: 35px;
            padding-bottom: 50px;
            border-left: 2px solid #e2e8f0;
        }

        .timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }

        .timeline-dot {
            position: absolute;
            left: -9px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-color);
            border: 4px solid var(--white);
            box-shadow: 0 0 0 1px var(--accent-color);
        }

        .job-header { margin-bottom: 12px; }
        .job-period { font-size: 0.9rem; color: var(--accent-color); font-weight: 700; margin-bottom: 4px; display: block; }
        .job-title { font-size: 1.25rem; font-weight: 700; color: var(--primary-dark); }
        .job-company { font-size: 1.1rem; color: var(--text-light); font-weight: 500; }

        .job-desc li {
            position: relative;
            padding-left: 15px;
            margin-bottom: 6px;
            font-size: 1rem;
            color: var(--text-main);
        }
        .job-desc li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--text-light);
        }

        /* --- Projects --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .project-thumb {
            width: 100%;
            height: 180px;
            background-color: #f1f5f9;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        
        .project-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .project-thumb:hover img { transform: scale(1.05); }

        .project-body { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .project-title { font-size: 1.2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 10px; }
        
        .project-tags { margin-bottom: 15px; }
        .p-tag { 
            display: inline-block; 
            font-size: 0.75rem; 
            background: #f1f5f9; 
            color: var(--text-light); 
            padding: 4px 8px; 
            border-radius: 4px; 
            margin-right: 5px; margin-bottom: 5px;
        }

        .project-desc { font-size: 0.95rem; color: var(--text-main); margin-bottom: 20px; flex: 1; }

        .project-result {
            background-color: #f0fdf4;
            border-left: 4px solid var(--success);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #166534;
        }
        .project-result strong { display: block; margin-bottom: 4px; font-weight: 700; }

        /* --- Education --- */
        .education-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .education-item:last-child { border-bottom: none; }
        
        .ed-title { font-weight: 700; color: var(--primary-dark); }
        .ed-sub { font-size: 0.9rem; color: var(--text-light); }
        .ed-date { font-weight: 600; color: var(--accent-color); font-size: 0.9rem; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero { padding: 60px 20px 80px; }
            .hero h1 { font-size: 1.7rem; }
            .container { padding: 0 15px 40px; }
            section { padding: 25px; }
            .project-grid { grid-template-columns: 1fr; }
        }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { max-width: 90%; max-height: 90%; border-radius: 5px; }
        .close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
    </script>
</head>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        function openModal(element) {
            var modal = document.getElementById("imageModal");
            var modalImg = document.getElementById("modalImg");
            var img = element.querySelector('img');
            modal.style.display = "flex";
            modalImg.src = img.src;
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }

        window.onclick = function(event) {
            var modal = document.getElementById("imageModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
